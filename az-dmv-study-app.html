<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ DMV Study App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2236;
    --border: #1e2d47;
    --accent: #f5a623;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8edf5;
    --muted: #6b7a99;
    --highlight: #2a3a5e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0, transparent calc(50% - 2px), rgba(245,166,35,0.04) calc(50% - 2px), rgba(245,166,35,0.04) calc(50% + 2px), transparent calc(50% + 2px), transparent 100%),
      radial-gradient(ellipse at 20% 0%, rgba(245,166,35,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(232,69,69,0.05) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 20px 60px; }
  header { padding: 36px 0 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
  .logo-badge { width: 52px; height: 52px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', cursive; font-size: 22px; color: #0a0e1a; flex-shrink: 0; box-shadow: 0 0 20px rgba(245,166,35,0.3); }
  .header-text h1 { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .header-text p { color: var(--muted); font-size: 13px; margin-top: 3px; font-weight: 300; }
  .score-strip { margin-left: auto; text-align: right; }
  .score-num { font-family: 'Bebas Neue', cursive; font-size: 32px; color: var(--accent); line-height: 1; }
  .score-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 28px; }
  .topic-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); transition: all 0.2s; text-align: left; font-weight: 400; }
  .topic-btn:hover { border-color: var(--accent); color: var(--text); background: var(--highlight); }
  .topic-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 600; }
  .topic-btn .topic-icon { display: block; font-size: 18px; margin-bottom: 4px; }
  .mode-row { display: flex; gap: 8px; margin-bottom: 28px; }
  .mode-btn { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); transition: all 0.2s; font-weight: 400; text-align: center; }
  .mode-btn.active { background: rgba(245,166,35,0.12); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .bank-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .start-btn { width: 100%; background: var(--accent); color: #0a0e1a; border: none; border-radius: 10px; padding: 16px; font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(245,166,35,0.2); margin-bottom: 36px; }
  .start-btn:hover { background: #ffba45; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(245,166,35,0.35); }
  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 20px; animation: slideIn 0.35s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .q-tag { background: rgba(245,166,35,0.12); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .q-num { color: var(--muted); font-size: 12px; }
  .q-diff { margin-left: auto; font-size: 11px; }
  .q-diff.easy { color: var(--green); }
  .q-diff.medium { color: var(--accent); }
  .q-diff.hard { color: var(--red); }
  .question-text { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 24px; color: var(--text); }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 14px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); text-align: left; transition: all 0.18s; display: flex; align-items: center; gap: 12px; font-weight: 400; line-height: 1.4; }
  .option-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; color: var(--muted); transition: all 0.18s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--highlight); }
  .option-btn:hover:not(:disabled) .option-letter { background: var(--accent); color: #0a0e1a; }
  .option-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.08); }
  .option-btn.correct .option-letter { background: var(--green); color: white; }
  .option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); }
  .option-btn.wrong .option-letter { background: var(--red); color: white; }
  .option-btn:disabled { cursor: default; }
  .tf-row { display: flex; gap: 12px; }
  .tf-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 18px; cursor: pointer; font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 2px; color: var(--muted); transition: all 0.18s; text-align: center; }
  .tf-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--highlight); }
  .tf-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.08); color: var(--green); }
  .tf-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); color: var(--red); }
  .tf-btn:disabled { cursor: default; }
  .explanation { margin-top: 18px; padding: 16px 18px; background: rgba(245,166,35,0.07); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 14px; color: #b8c5df; line-height: 1.6; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .explanation strong { color: var(--accent); font-weight: 600; }
  .next-btn { width: 100%; background: transparent; border: 1px solid var(--accent); border-radius: 9px; padding: 14px; font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 2px; color: var(--accent); cursor: pointer; transition: all 0.2s; margin-top: 14px; }
  .next-btn:hover { background: var(--accent); color: #0a0e1a; }
  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 36px 28px; text-align: center; }
  .results-title { font-family: 'Bebas Neue', cursive; font-size: 14px; letter-spacing: 3px; margin-bottom: 8px; }
  .results-title.pass { color: var(--green); }
  .results-title.good { color: var(--accent); }
  .results-title.fail { color: var(--red); }
  .results-score { font-family: 'Bebas Neue', cursive; font-size: 72px; line-height: 1; color: var(--text); margin-bottom: 8px; }
  .results-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .results-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; }
  .stat-val { font-family: 'Bebas Neue', cursive; font-size: 28px; color: var(--accent); }
  .stat-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .restart-btn { background: var(--accent); color: #0a0e1a; border: none; border-radius: 9px; padding: 14px 28px; font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .restart-btn:hover { background: #ffba45; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-badge">AZ</div>
    <div class="header-text">
      <h1>AZ DMV Study App</h1>
      <p>Arizona Driver License Test Prep · 160 Questions</p>
    </div>
    <div class="score-strip" id="scoreStrip" style="display:none">
      <div class="score-num" id="scoreDisplay">0/0</div>
      <div class="score-label">Score</div>
    </div>
  </header>

  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <!-- SETUP -->
  <div id="setupScreen">
    <div class="section-label">Choose Topic</div>
    <div class="topic-grid" id="topicGrid">
      <button class="topic-btn active" data-topic="all"><span class="topic-icon">🗺️</span>All Topics</button>
      <button class="topic-btn" data-topic="signs"><span class="topic-icon">🚦</span>Signs & Signals</button>
      <button class="topic-btn" data-topic="rules"><span class="topic-icon">📋</span>Rules of Road</button>
      <button class="topic-btn" data-topic="safety"><span class="topic-icon">🛡️</span>Safe Driving</button>
      <button class="topic-btn" data-topic="license"><span class="topic-icon">🪪</span>Licensing</button>
      <button class="topic-btn" data-topic="emergency"><span class="topic-icon">🚨</span>Emergencies</button>
      <button class="topic-btn" data-topic="sharing"><span class="topic-icon">🚲</span>Sharing Road</button>
      <button class="topic-btn" data-topic="parking"><span class="topic-icon">🅿️</span>Parking</button>
    </div>
    <div class="section-label">Question Type</div>
    <div class="mode-row" id="modeRow">
      <button class="mode-btn active" data-mode="multiple">Multiple Choice</button>
      <button class="mode-btn" data-mode="truefalse">True / False</button>
      <button class="mode-btn" data-mode="mixed">Mixed</button>
    </div>
    <div class="section-label">Number of Questions</div>
    <div class="mode-row" id="countRow">
      <button class="mode-btn active" data-count="10">10</button>
      <button class="mode-btn" data-count="20">20</button>
      <button class="mode-btn" data-count="30">30</button>
    </div>
    <div class="bank-info" id="bankInfo">📚 160 questions available</div>
    <button class="start-btn" onclick="startSession()">START PRACTICE TEST →</button>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" style="display:none">
    <div id="questionArea"></div>
  </div>

  <!-- RESULTS -->
  <div id="resultsScreen" style="display:none">
    <div class="results-card" id="resultsCard"></div>
  </div>
</div>

<script>
const QUESTION_BANK = [
  // ── SIGNS & SIGNALS (20 questions) ──
  { question:"What does a flashing RED traffic light mean?", type:"multiple", options:["Slow down and proceed with caution","Stop completely, then proceed when safe","Yield to oncoming traffic","The light is about to turn green"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"A flashing red light has the same meaning as a stop sign — come to a complete stop, then proceed when safe." },
  { question:"What does a flashing YELLOW traffic light mean?", type:"multiple", options:["Stop and wait for green","Proceed without slowing","Slow down and proceed with caution","Yield to pedestrians only"], correctIndex:2, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"A flashing yellow means slow down and proceed with caution. You do not need to stop." },
  { question:"What shape is a railroad warning sign?", type:"multiple", options:["Octagon","Diamond","Circle","Triangle"], correctIndex:2, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"Railroad warning signs are circular. This unique shape helps drivers identify railroad crossings quickly." },
  { question:"What shape is a school crossing sign?", type:"multiple", options:["Diamond","Rectangle","Pentagon (5-sided)","Octagon"], correctIndex:2, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"School crossing signs are pentagon-shaped (5 sides), helping drivers recognize school zones instantly." },
  { question:"A pennant-shaped sign indicates:", type:"multiple", options:["School zone ahead","No passing zone","Railroad crossing","Yield ahead"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"The pennant shape is exclusively used for No Passing Zone signs, always placed on the left side of the road." },
  { question:"What does a RED ARROW signal mean?", type:"multiple", options:["You may turn carefully","You must NOT turn in the direction of the arrow","Yield before turning","Turn only if pedestrians are clear"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"A red arrow means you may NOT turn in the direction the arrow points. Wait for a green signal." },
  { question:"A flashing YELLOW ARROW means:", type:"multiple", options:["You must stop before turning","Turn quickly before the light changes","Slow down, turn with caution, yield to oncoming traffic and pedestrians","You have the right-of-way to turn"], correctIndex:2, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"A flashing yellow arrow means you may turn but must slow down, yield to oncoming vehicles and pedestrians, and use caution." },
  { question:"What does a GREEN ARROW signal mean?", type:"multiple", options:["You may proceed in the direction of the arrow if in the proper lane","You must yield before proceeding","You must stop and wait","You may turn only after yielding"], correctIndex:0, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"A green arrow means you may proceed in the direction it points if you are in the correct lane." },
  { question:"If a traffic signal is completely inoperative, you should:", type:"multiple", options:["Proceed through without stopping","Treat it as a 4-way stop","Yield to all traffic","The driver on the right always goes first"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"An inoperative signal is treated as a 4-way stop. At a 4-way stop, the driver on the left yields to the driver on the right." },
  { question:"What does a WHITE painted curb indicate?", type:"multiple", options:["No stopping, standing, or parking","Stop only to pick up or drop off passengers","Stop to load or unload, stay with vehicle","No parking during certain hours"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"A white curb means you may stop only long enough to pick up or drop off passengers." },
  { question:"What does a YELLOW painted curb indicate?", type:"multiple", options:["No stopping at any time","Stop only to pick up or drop off passengers","Stop to load or unload, stay with your vehicle","Parking permitted with a permit"], correctIndex:2, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"A yellow curb means you may stop to load or unload, but you must stay with your vehicle." },
  { question:"What does a RED painted curb indicate?", type:"multiple", options:["No parking between 7am–6pm","Stop only in emergencies","No stopping, standing, or parking at any time","Parking limited to 15 minutes"], correctIndex:2, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"A red curb means absolutely no stopping, standing, or parking at any time." },
  { question:"Double solid yellow lines on the road mean:", type:"multiple", options:["Passing is permitted in either direction","No passing in either direction; may only cross to turn left","Passing is permitted when safe","You may use the center lane for left turns"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"Double solid yellow lines prohibit passing in either direction. You may only cross them to make a left turn." },
  { question:"Broken yellow lines on the road mean:", type:"multiple", options:["No passing allowed","Passing on the left is permitted when clear","These mark the right edge of the road","Lane changes are prohibited"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"Broken yellow lines separate opposing traffic and indicate passing on the left is permitted when the road ahead is clear." },
  { question:"Orange signs in a construction zone mean:", type:"multiple", options:["Warning of a hazard ahead","You must obey all posted instructions","Information about services ahead","Guidance for detours only"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"Orange signs in work/construction zones must be obeyed by all drivers." },
  { question:"A YELLOW signal light means:", type:"multiple", options:["Speed up to clear the intersection","Stop if you have not yet entered the intersection","Always stop immediately","Proceed normally"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"Yellow means prepare to stop. If you have not entered the intersection, you should stop. If already in it, continue through." },
  { question:"What does a diamond-shaped yellow sign typically indicate?", type:"multiple", options:["Regulatory information","A warning or hazard ahead","School zone","Railroad crossing"], correctIndex:1, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"Diamond-shaped yellow signs are warning signs indicating a potential hazard ahead." },
  { question:"True or False: You may make a right turn on a red light after a complete stop, unless a sign prohibits it.", type:"truefalse", options:["True","False"], correctIndex:0, difficulty:"easy", topic:"Signs & Signals", category:"signs", explanation:"In Arizona, right turn on red is permitted after a full stop, provided no sign prohibits it and the way is clear." },
  { question:"True or False: A solid white line between lanes means you are encouraged to change lanes freely.", type:"truefalse", options:["True","False"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"Solid white lines discourage lane changes, especially near intersections." },
  { question:"True or False: A double solid white line may be crossed to pass another vehicle.", type:"truefalse", options:["True","False"], correctIndex:1, difficulty:"medium", topic:"Signs & Signals", category:"signs", explanation:"A double solid white line prohibits crossing. You must not change lanes or pass where these appear." },

  // ── RULES OF THE ROAD (22 questions) ──
  { question:"What is the speed limit in a school zone when children are present?", type:"multiple", options:["10 mph","15 mph","20 mph","25 mph"], correctIndex:1, difficulty:"easy", topic:"Rules of Road", category:"rules", explanation:"The maximum speed in a school zone is 15 mph from the first sign past the school crossing." },
  { question:"What is the default speed limit in a business or residential district when not posted?", type:"multiple", options:["15 mph","25 mph","35 mph","45 mph"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"When no speed limit is posted in a business or residential district, the limit is 25 mph." },
  { question:"What is the default speed limit on open highways when not posted?", type:"multiple", options:["45 mph","55 mph","65 mph","70 mph"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"On open highways and city freeways with no posted limit, the speed limit is 55 mph." },
  { question:"On designated open highways, the default speed limit is:", type:"multiple", options:["55 mph","60 mph","65 mph","70 mph"], correctIndex:2, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Designated open highways have a speed limit of 65 mph when not otherwise posted." },
  { question:"Rural freeways in Arizona have a default speed limit of:", type:"multiple", options:["65 mph","70 mph","75 mph","80 mph"], correctIndex:2, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Rural freeways in Arizona have a speed limit of 75 mph when not otherwise posted." },
  { question:"Speed violation fines in work zones are:", type:"multiple", options:["The same as regular zones","Doubled","Tripled","Subject to license suspension only"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Fines for speed violations in work/construction zones are doubled under Arizona law." },
  { question:"At a T-intersection where one road ends, who must yield?", type:"multiple", options:["The driver on the cross street","The driver on the street that ends","The driver going straight","Whoever arrived last"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"At a T-intersection, the driver on the street that ends must yield to traffic on the cross street." },
  { question:"When must you stop for a school bus?", type:"multiple", options:["Only when traveling in the same direction","Only on two-lane roads","Regardless of direction, unless on a divided highway with a physical barrier","Only when within 50 feet"], correctIndex:2, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"You must stop for a school bus regardless of direction. The only exception is on a divided highway with a physical barrier when traveling the opposite direction." },
  { question:"HOV (carpool) lanes require:", type:"multiple", options:["At least 2 persons including the driver during posted times","At least 3 persons at all times","Only commercial vehicles","A special permit"], correctIndex:0, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"HOV lanes require at least 2 persons (including the driver) during posted hours, Monday–Friday. Motorcycles and buses are also permitted." },
  { question:"How far from a railroad crossing must you stop when signals are active?", type:"multiple", options:["At least 5 feet","At least 10 feet","At least 15 feet","At least 25 feet"], correctIndex:2, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"You must stop at least 15 feet from the nearest rail when signals are flashing, a barricade is lowered, bells ring, or a flagger warns." },
  { question:"Passing is NOT permitted within how many feet of a railroad crossing?", type:"multiple", options:["50 feet","100 feet","200 feet","500 feet"], correctIndex:1, difficulty:"hard", topic:"Rules of Road", category:"rules", explanation:"You may not pass within 100 feet of a railroad crossing, intersection, bridge, tunnel, or underpass." },
  { question:"When making a right turn, you should approach:", type:"multiple", options:["From the center of the road","As close to the right curb as possible","From the left lane","From any lane"], correctIndex:1, difficulty:"easy", topic:"Rules of Road", category:"rules", explanation:"Right turns should be made from the rightmost lane, approaching as close to the right curb as possible." },
  { question:"A two-way left turn lane may be used for:", type:"multiple", options:["Passing slow vehicles","Left turns only — not through traffic","High-speed merging","Any vehicle needing to pass"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Two-way left turn lanes are for left turns only and cannot be used for through traffic or passing." },
  { question:"You must signal a turn at least how far in advance?", type:"multiple", options:["50 feet","100 feet","150 feet","200 feet"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Arizona law requires signaling at least 100 feet (about 4 seconds) before turning." },
  { question:"You may pass on the right when:", type:"multiple", options:["The vehicle ahead is moving slowly","The driver ahead is turning LEFT and the road is wide enough","On any road with a broken center line","When you are in a hurry"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Passing on the right is only allowed when the driver ahead is turning left, on open highways with 2+ same-direction lanes, or in business/residential districts with 2+ same-direction lanes." },
  { question:"True or False: You may pass another vehicle by driving off the paved portion of the road.", type:"truefalse", options:["True","False"], correctIndex:1, difficulty:"easy", topic:"Rules of Road", category:"rules", explanation:"You must NEVER pass on the right by driving off the paved portion of the roadway. This is illegal and dangerous." },
  { question:"True or False: U-turns are always illegal in Arizona.", type:"truefalse", options:["True","False"], correctIndex:1, difficulty:"easy", topic:"Rules of Road", category:"rules", explanation:"U-turns are permitted in Arizona when safe, not interfering with traffic, and not prohibited by signs." },
  { question:"True or False: At a roundabout, you must yield to vehicles already inside.", type:"truefalse", options:["True","False"], correctIndex:0, difficulty:"easy", topic:"Rules of Road", category:"rules", explanation:"When entering a roundabout, yield to pedestrians, bicyclists, and vehicles already circulating inside." },
  { question:"Roundabouts are designed for travel at what speed?", type:"multiple", options:["5–10 mph","15–20 mph","25–35 mph","Up to 45 mph"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Roundabouts are designed for 15–20 mph travel. Their circular design naturally slows traffic." },
  { question:"When passing another vehicle, you may return to the right lane when:", type:"multiple", options:["You are alongside the other vehicle","You can see both headlights of the passed vehicle in your rearview mirror","You have traveled 200 feet past them","The other driver signals you to move over"], correctIndex:1, difficulty:"medium", topic:"Rules of Road", category:"rules", explanation:"Return to the right lane only when you can see both headlights of the passed vehicle in your rearview mirror." },
  { question:"True or False: You may signal a turn beyond an intersection before you are in the intersection.", type:"truefalse", options:["True","False"], correctIndex:1, difficulty:"hard", topic:"Rules of Road", category:"rules", explanation:"Do NOT signal a turn beyond an intersection until you are IN the intersection, to avoid confusing other drivers." },

let selectedTopic = 'all';
let selectedMode = 'multiple';
let selectedCount = 10;
let currentQ = 0;

function updateBankInfo() {
  let pool = selectedTopic === 'all' ? QUESTION_BANK : QUESTION_BANK.filter(q => q.category === selectedTopic);
  if (selectedMode !== 'mixed') pool = pool.filter(q => q.type === selectedMode);
  document.getElementById('bankInfo').textContent = `📚 ${pool.length} questions available for this selection`;
}

document.querySelectorAll('#topicGrid .topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#topicGrid .topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTopic = btn.dataset.topic;
    updateBankInfo();
  });
});
document.querySelectorAll('#modeRow .mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#modeRow .mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMode = btn.dataset.mode;
    updateBankInfo();
  });
});
document.querySelectorAll('#countRow .mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#countRow .mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCount = parseInt(btn.dataset.count);
  });
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession() {
  let pool = selectedTopic === 'all' ? QUESTION_BANK : QUESTION_BANK.filter(q => q.category === selectedTopic);
  if (selectedMode !== 'mixed') pool = pool.filter(q => q.type === selectedMode);
  if (pool.length === 0) { alert('No questions available for this combination. Try a different topic or question type.'); return; }
  sessionQuestions = shuffle(pool).slice(0, Math.min(selectedCount, pool.length));
  currentQ = 0; correct = 0; answered = false;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('scoreStrip').style.display = 'block';
  updateScore();
  renderQuestion();
}

function renderQuestion() {
  const q = sessionQuestions[currentQ];
  const qNum = currentQ + 1;
  const total = sessionQuestions.length;
  document.getElementById('progressFill').style.width = `${(currentQ / total) * 100}%`;
  const area = document.getElementById('questionArea');
  let optionsHTML = '';
  if (q.type === 'truefalse') {
    optionsHTML = `<div class="tf-row">${q.options.map((opt,i) => `<button class="tf-btn" onclick="selectAnswer(${i})" data-idx="${i}">${opt.toUpperCase()}</button>`).join('')}</div>`;
  } else {
    const L = ['A','B','C','D'];
    optionsHTML = `<div class="options-list">${q.options.map((opt,i) => `<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${L[i]}</span>${opt}</button>`).join('')}</div>`;
  }
  area.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag">${q.topic}</span>
        <span class="q-num">Q${qNum} / ${total}</span>
        <span class="q-diff ${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="question-text">${q.question}</div>
      ${optionsHTML}
      <div id="explanation" style="display:none" class="explanation"></div>
    </div>
    <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">
      ${qNum < total ? 'NEXT QUESTION →' : 'SEE RESULTS →'}
    </button>`;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = sessionQuestions[currentQ];
  const isCorrect = idx === q.correctIndex;
  if (isCorrect) correct++;
  updateScore();
  document.querySelectorAll('.option-btn, .tf-btn').forEach(btn => {
    btn.disabled = true;
    const i = parseInt(btn.dataset.idx);
    if (i === q.correctIndex) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong> ${q.explanation}`;
  exp.style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  answered = false;
  if (currentQ >= sessionQuestions.length) showResults();
  else renderQuestion();
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = `${correct}/${Math.min(currentQ + (answered ? 1 : 0), sessionQuestions.length)}`;
}

function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';
  document.getElementById('progressFill').style.width = '100%';
  const total = sessionQuestions.length;
  const pct = Math.round((correct / total) * 100);
  const grade = pct >= 90 ? 'EXCELLENT' : pct >= 80 ? 'PASSED' : pct >= 60 ? 'KEEP STUDYING' : 'NEEDS WORK';
  const gradeClass = pct >= 90 ? 'pass' : pct >= 80 ? 'good' : 'fail';
  document.getElementById('resultsCard').innerHTML = `
    <div class="results-title ${gradeClass}">${grade}</div>
    <div class="results-score">${pct}%</div>
    <div class="results-sub">${correct} correct out of ${total} · ${pct >= 80 ? 'Arizona DMV passing score is 80%' : 'You need 80% to pass the real test'}</div>
    <div class="results-stats">
      <div class="stat-box"><div class="stat-val">${correct}</div><div class="stat-key">Correct</div></div>
      <div class="stat-box"><div class="stat-val">${total - correct}</div><div class="stat-key">Missed</div></div>
      <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-key">Score</div></div>
    </div>
    <div style="margin-bottom:20px;color:var(--muted);font-size:13px;line-height:1.6">
      ${pct >= 80 ? '🎉 Great job! You have a solid understanding of Arizona driving laws.' : '📖 Review the sections where you missed questions. Focus on speed limits, traffic signs, and right-of-way rules.'}
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="restart-btn" onclick="retrySession()">TRY AGAIN</button>
      <button class="restart-btn" style="background:transparent;border:1px solid var(--accent);color:var(--accent)" onclick="goHome()">CHANGE TOPIC</button>
    </div>`;
}

function retrySession() {
  document.getElementById('resultsScreen').style.display = 'none';
  currentQ = 0; correct = 0; answered = false;
  sessionQuestions = shuffle(sessionQuestions);
  document.getElementById('quizScreen').style.display = 'block';
  updateScore();
  renderQuestion();
}

function goHome() {
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('scoreStrip').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}
</script>
</body>
</html>
